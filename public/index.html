<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>一级信息流 · 全球权威实时信息</title>
  <meta name="description" content="AI情报 / 中国要闻 / 全球一级权威信息流 / 实时导航 — 聚合全球与中国 AI、时事和社会新闻；外文标题提供中文短译，点击直达原文。" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sb-brand">
        <span class="sb-logo">📡</span>
        <div>
          <div class="sb-title">一级信息流</div>
          <div class="sb-subtitle">Primary Newsflow</div>
        </div>
      </div>
      <nav class="sb-nav" id="sbNav"></nav>
      <div class="sb-footer">
        <span id="sbUpdated">加载中…</span>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <header class="topbar">
        <button class="menu-toggle" id="menuToggle" title="菜单">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-info">
          <h2 class="section-title" id="sectionTitle">AI 情报</h2>
          <p class="section-desc" id="sectionDesc"></p>
        </div>
        <div class="topbar-actions">
          <button class="btn-icon" id="refreshBtn" title="刷新数据">↻</button>
        </div>
      </header>

      <div class="content-area">

        <!-- Stats bar -->
        <div class="stats-bar" id="statsBar"></div>

        <!-- Toolbar (for non-nav sections) -->
        <div class="toolbar" id="toolbar">
          <input id="searchInput" type="search" placeholder="搜索标题 / 机构 / 关键词…" />
          <div class="filter-chips" id="filterChips"></div>
        </div>

        <!-- Feed -->
        <div class="feed-container" id="feedContainer"></div>

        <!-- Nav grid (for nav section) -->
        <div class="nav-grid" id="navGrid"></div>

        <!-- Empty state -->
        <div class="empty-state" id="emptyState" hidden>
          <div class="empty-icon">📭</div>
          <p>没有匹配的信息</p>
        </div>

      </div>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
