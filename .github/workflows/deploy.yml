name: Build & Deploy Newsflow

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 * * * *"   # 每小时抓取一次
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Restore translation cache
        uses: actions/cache@v4
        with:
          path: .cache/translations.json
          key: translations-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            translations-${{ runner.os }}-

      - name: Fetch primary sources, translate headlines & build data
        run: npm run build

      - name: Validate generated feed
        run: npm test

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
